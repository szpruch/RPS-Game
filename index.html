<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אבן נייר מספריים</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <!-- ════════════════════════════════════════════════
       SCREEN 1 — Home
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-home">
    <header>
      <h1>אבן נייר מספריים</h1>
      <p class="tagline">בחר את הקרב שלך</p>
    </header>

    <div class="mode-cards">
      <button class="mode-card" id="btn-vs-cpu">
        <span class="mode-icon">🤖</span>
        <span class="mode-label">נגד מחשב</span>
        <span class="mode-sub">משחק יחיד קלאסי</span>
      </button>
      <button class="mode-card" id="btn-vs-player">
        <span class="mode-icon">🌐</span>
        <span class="mode-label">נגד שחקן אונליין</span>
        <span class="mode-sub">אתגר חבר</span>
      </button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       SCREEN 2 — Multiplayer Lobby
  ════════════════════════════════════════════════ -->
  <div class="screen hidden" id="screen-lobby">
    <button class="back-btn" id="lobby-back">חזרה &#8592;</button>

    <header>
      <h1>לובי אונליין</h1>
      <p class="tagline">צור חדר או הצטרף לחדר קיים</p>
    </header>

    <div class="lobby-section">
      <button class="primary-btn" id="btn-create-room">צור חדר</button>
    </div>

    <div class="lobby-divider"><span>או</span></div>

    <div class="lobby-section">
      <label class="lobby-label" for="join-code-input">הכנס קוד חדר</label>
      <div class="join-row">
        <button class="primary-btn" id="btn-join-room">הצטרף</button>
        <input
          type="text"
          id="join-code-input"
          class="code-input"
          maxlength="4"
          placeholder="0000"
          autocomplete="off"
          spellcheck="false"
          inputmode="numeric"
        />
      </div>
      <p class="error-msg hidden" id="lobby-error"></p>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       SCREEN 3 — Waiting (after creating room)
  ════════════════════════════════════════════════ -->
  <div class="screen hidden" id="screen-waiting">
    <button class="back-btn" id="waiting-back">חזרה &#8592;</button>

    <header>
      <h1>החדר נוצר</h1>
      <p class="tagline">שתף את הקוד עם היריב שלך</p>
    </header>

    <div class="room-code-display" id="waiting-code">----</div>

    <div class="waiting-indicator">
      <span class="waiting-dot"></span>
      <span class="waiting-dot"></span>
      <span class="waiting-dot"></span>
      <span class="waiting-text">ממתין ליריב...</span>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       SCREEN 4 — Game (single-player & multiplayer)
  ════════════════════════════════════════════════ -->
  <div class="screen hidden" id="screen-game">
    <button class="back-btn" id="game-back">חזרה &#8592;</button>

    <!-- Status bar (only visible in multiplayer) -->
    <div class="status-bar hidden" id="game-status-bar">
      <span id="status-mode-label"></span>
      <span class="status-code hidden" id="status-room-code"></span>
    </div>

    <header>
      <h1>אבן נייר מספריים</h1>
    </header>

    <div class="scoreboard">
      <div class="score-block">
        <span class="score-label">את/ה</span>
        <span class="score-value" id="player-score">0</span>
      </div>
      <div class="score-divider">—</div>
      <div class="score-block">
        <span class="score-label" id="opponent-score-label">מחשב</span>
        <span class="score-value" id="cpu-score">0</span>
      </div>
    </div>

    <div class="battle-area">
      <div class="choice-display" id="player-display">
        <div class="choice-icon" id="player-icon">❓</div>
        <span class="choice-label">את/ה</span>
      </div>
      <div class="vs-badge">VS</div>
      <div class="choice-display" id="cpu-display">
        <div class="choice-icon" id="cpu-icon">❓</div>
        <span class="choice-label" id="cpu-display-label">מחשב</span>
      </div>
    </div>

    <div class="result-banner" id="result-banner">
      <span id="result-text">בחר את המהלך שלך!</span>
    </div>

    <div class="mp-waiting hidden" id="mp-waiting-msg">
      <span class="mp-waiting-dot"></span>
      ממתין למהלך היריב...
    </div>

    <div class="choices">
      <button class="choice-btn" data-choice="rock" title="אבן (A)">
        <span class="btn-icon">🪨</span>
        <span class="btn-label">אבן</span>
      </button>
      <button class="choice-btn" data-choice="paper" title="נייר (N)">
        <span class="btn-icon">📄</span>
        <span class="btn-label">נייר</span>
      </button>
      <button class="choice-btn" data-choice="scissors" title="מספריים (M)">
        <span class="btn-icon">✂️</span>
        <span class="btn-label">מספריים</span>
      </button>
    </div>

    <button class="reset-btn" id="reset-btn">אפס ניקוד</button>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="game.js?v=3"></script>
</body>
</html>
